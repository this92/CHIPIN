<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finding Student...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#5B21B6,#7C3AED,#8B5CF6);
overflow:hidden;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#FFD54F;
opacity:.12;
filter:blur(180px);
border-radius:50%;
animation:move 8s ease-in-out infinite;
}

@keyframes move{
50%{
transform:translate(80px,-60px);
}
}

/* Main Container */

.container{
text-align:center;
color:white;
animation:fadeIn .8s;
}

/* Profile Icon */

.profile{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid #FFD54F;
animation:pulse 2s infinite;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

}

/* Text */

h1{
margin-top:25px;
font-size:34px;
font-weight:600;
}

p{
margin-top:10px;
font-size:18px;
color:#FDE68A;
}

/* Loading Dots */

.dots{
margin-top:35px;
}

.dot{
display:inline-block;
width:12px;
height:12px;
margin:0 6px;
background:#FFD54F;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:translateY(0);
opacity:.4;
}

40%{
transform:translateY(-12px);
opacity:1;
}

}

/* Fade */

.fade{
animation:fadeOut .8s forwards;
}

@keyframes fadeOut{
to{
opacity:0;
transform:scale(1.08);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container" id="container">

<div class="profile">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Default Profile">
</div>

<h1>Finding Student</h1>

<p>Please wait while we locate the student's profile...</p>

<div class="dots">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

<script>

// Start fade-out animation at 4.2s
setTimeout(function(){
  document.getElementById("container").classList.add("fade");
}, 4200);

// Redirect to profile.html at 5s
setTimeout(function(){
  window.location.href = "profile.html";
}, 5000);

</script>

</body>
</html>
