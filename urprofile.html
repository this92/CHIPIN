<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,Helvetica,sans-serif; }

body { background:#f4f5f8; min-height:100vh; }

.hamburger {
    position:fixed; top:20px; left:20px; z-index:2000;
    background:white; border:none; width:44px; height:44px;
    border-radius:12px; cursor:pointer;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px;
    box-shadow:0 4px 16px rgba(0,0,0,.12); transition:background .2s;
}
.hamburger:hover { background:#f0ebff; }
.hamburger span { display:block; width:20px; height:2px; background:#6d28d9; border-radius:2px; transition:.3s; }
.hamburger.active span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.hamburger.active span:nth-child(2) { opacity:0; }
.hamburger.active span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1500; opacity:0; pointer-events:none; transition:opacity .3s; }
.overlay.active { opacity:1; pointer-events:all; }

.sidebar {
    position:fixed; top:0; left:0; height:100vh; width:260px;
    background:white; z-index:1600;
    transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
    display:flex; flex-direction:column;
    box-shadow:4px 0 30px rgba(0,0,0,.12);
}
.sidebar.active { transform:translateX(0); }
.sidebar-header { padding:28px 24px 20px; border-bottom:1px solid #f0ebff; }
.sidebar-logo { font-size:22px; font-weight:bold; color:#6d28d9; letter-spacing:-0.5px; }
.sidebar-subtitle { font-size:12px; color:#aaa; margin-top:4px; }
.sidebar-links { list-style:none; padding:16px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
.sidebar-links li a { display:flex; align-items:center; text-decoration:none; color:#444; padding:12px 14px; border-radius:10px; font-size:15px; font-weight:500; transition:.2s; }
.sidebar-links li a:hover, .sidebar-links li a.active { background:#f0ebff; color:#6d28d9; }
.sidebar-footer { padding:20px 24px; border-top:1px solid #f0ebff; font-size:12px; color:#bbb; }

.page { max-width:720px; margin:0 auto; padding:40px 20px 60px; }

.cover {
    height:160px;
    background:linear-gradient(135deg,#5b21b6 0%,#7c3aed 50%,#a855f7 100%);
    border-radius:16px 16px 0 0; position:relative; cursor:pointer; overflow:hidden;
}
.cover-edit-hint {
    position:absolute; bottom:12px; right:14px;
    background:rgba(0,0,0,.35); color:white; font-size:12px;
    padding:5px 10px; border-radius:20px; opacity:0; transition:opacity .2s;
}
.cover:hover .cover-edit-hint { opacity:1; }
#coverInput { display:none; }

.profile-card {
    background:white; border-radius:0 0 16px 16px;
    padding:0 28px 28px;
    box-shadow:0 4px 20px rgba(0,0,0,.07); margin-bottom:20px; position:relative;
}
.avatar-wrap { position:relative; display:inline-block; margin-top:-48px; margin-bottom:12px; }
.avatar { width:96px; height:96px; border-radius:50%; border:4px solid white; object-fit:cover; display:block; background:#e0d7f7; }
.avatar-edit {
    position:absolute; bottom:4px; right:4px; width:28px; height:28px;
    background:#6d28d9; border:2px solid white; border-radius:50%;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:white; transition:background .2s;
}
.avatar-edit:hover { background:#5b21b6; }
#avatarInput { display:none; }

.profile-name {
    font-size:24px; font-weight:700; color:#111;
    outline:none; border:none; background:transparent; width:100%; margin-bottom:4px;
}
.profile-name:focus { border-bottom:2px solid #6d28d9; }
.profile-tagline {
    font-size:15px; color:#6d28d9; font-weight:500;
    outline:none; border:none; background:transparent; width:100%; margin-bottom:16px;
}
.profile-tagline:focus { border-bottom:2px solid #6d28d9; }
.edit-hint { font-size:12px; color:#bbb; margin-bottom:18px; }

.save-btn {
    display:none; background:#6d28d9; color:white; border:none;
    padding:10px 22px; border-radius:8px; font-size:14px; font-weight:600;
    cursor:pointer; transition:background .2s; margin-top:8px;
}
.save-btn:hover { background:#5b21b6; }
.save-btn.visible { display:inline-block; }

.section { background:white; border-radius:16px; padding:24px 28px; box-shadow:0 4px 20px rgba(0,0,0,.07); margin-bottom:20px; }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.section-title { font-size:17px; font-weight:700; color:#111; }
.add-btn { background:#f0ebff; color:#6d28d9; border:none; padding:7px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .2s; }
.add-btn:hover { background:#e0d7f7; }

.about-text {
    font-size:15px; color:#444; line-height:1.7;
    outline:none; border:none; background:transparent;
    width:100%; resize:none; min-height:80px; font-family:Arial,Helvetica,sans-serif;
}
.about-text:focus { border-bottom:2px solid #6d28d9; }

.project-item { border:1px solid #ede9fe; border-radius:12px; padding:16px 18px; margin-bottom:12px; position:relative; }
.project-item:last-child { margin-bottom:0; }
.project-name { font-size:15px; font-weight:600; color:#111; outline:none; border:none; background:transparent; width:100%; margin-bottom:6px; }
.project-name:focus { border-bottom:2px solid #6d28d9; }
.project-link { font-size:13px; color:#6d28d9; outline:none; border:none; background:transparent; width:calc(100% - 70px); text-decoration:underline; }
.project-link:focus { border-bottom:2px solid #6d28d9; }
.project-link-wrap { display:flex; align-items:center; gap:8px; }
.project-link-label { font-size:13px; color:#999; white-space:nowrap; }
.delete-btn { position:absolute; top:12px; right:14px; background:none; border:none; color:#ccc; font-size:18px; cursor:pointer; line-height:1; transition:color .2s; }
.delete-btn:hover { color:#e24b4a; }

.skills-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.skill-tag { background:#f0ebff; color:#5b21b6; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px; }
.skill-remove { background:none; border:none; color:#9f7aea; font-size:14px; cursor:pointer; padding:0; line-height:1; transition:color .2s; }
.skill-remove:hover { color:#e24b4a; }
.skill-input-wrap { display:flex; gap:8px; }
.skill-input { flex:1; border:1.5px solid #e5e7eb; border-radius:8px; padding:9px 14px; font-size:14px; outline:none; transition:border-color .2s; }
.skill-input:focus { border-color:#6d28d9; }

footer { background:#0f0a1e; color:rgba(255,255,255,.45); text-align:center; padding:28px; font-size:13px; }
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
</button>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">LOGO</div>
        <div class="sidebar-subtitle">Student Portal</div>
    </div>
    <ul class="sidebar-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="urprofile.html" class="active">Your Profile</a></li>
        <li><a href="message.html">Messages</a></li>
        <li><a href="job.html">Jobs</a></li>
         <li><a href="brainstorm.html">Brainstorm</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="sidebar-footer">© 2026 Your Website</div>
</aside>

<div class="page">

    <div class="cover" id="coverArea" onclick="document.getElementById('coverInput').click()">
        <span class="cover-edit-hint">Click to change cover</span>
    </div>
    <input type="file" id="coverInput" accept="image/*">

    <div class="profile-card">
        <div class="avatar-wrap">
            <img id="avatarImg" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile Picture">
            <div class="avatar-edit" onclick="document.getElementById('avatarInput').click()">✎</div>
            <input type="file" id="avatarInput" accept="image/*">
        </div>
        <input class="profile-name" id="profileName" type="text" placeholder="Your name" oninput="showSave()">
        <input class="profile-tagline" id="profileTagline" type="text" placeholder="Title • University" oninput="showSave()">
        <div class="edit-hint">Click any field to edit</div>
        <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save changes</button>
    </div>

    <div class="section">
        <div class="section-header"><div class="section-title">About</div></div>
        <textarea class="about-text" id="aboutText" oninput="autoResize(this); showSave()"></textarea>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">Projects Done</div>
            <button class="add-btn" onclick="addProject()">+ Add Project</button>
        </div>
        <div id="projectsList"></div>
    </div>

    <div class="section">
        <div class="section-header"><div class="section-title">Skills</div></div>
        <div class="skills-wrap" id="skillsWrap"></div>
        <div class="skill-input-wrap">
            <input class="skill-input" id="skillInput" type="text" placeholder="Add a skill (e.g. Python)" onkeydown="if(event.key==='Enter') addSkill()">
            <button class="add-btn" onclick="addSkill()">+ Add</button>
        </div>
    </div>

    <div style="text-align:center; padding: 10px 0 30px;">
        <button onclick="saveProfile()" id="bottomSaveBtn"
            style="background:#6d28d9;color:white;border:none;padding:14px 48px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;"
            onmouseover="this.style.background='#5b21b6'"
            onmouseout="this.style.background='#6d28d9'">Save changes</button>
    </div>

</div>

<footer>© 2026 Your Website. All Rights Reserved.</footer>

<script>
const DEFAULTS = {
    name:     "Reza",
    tagline:  "BBA-CA Student \u2022 Vishwakarma University",
    about:    "Hello! I'm Reza, a BBA-CA student with a passion for web development, database management, programming, and software design. I enjoy creating modern websites and solving real-world problems through technology.",
    avatar:   "https://cdn-icons-png.flaticon.com/512/149/149071.png",
    cover:    null,
    skills:   ["HTML","CSS","JavaScript","Node.js","AngularJS","MySQL","Java"],
    projects: [
        { name:"Student Database Management System", link:"http://127.0.0.1:5500/Database_Project.pptx" },
        { name:"Personal Portfolio Website",         link:"http://127.0.0.1:5500/Portfolio.docx" }
    ]
};

let skills = [];

// ── LOAD ─────────────────────────────────────────────────
function getData() {
    try {
        const saved = JSON.parse(localStorage.getItem("profileData")) || {};
        return {
            name:     saved.name     ?? DEFAULTS.name,
            tagline:  saved.tagline  ?? DEFAULTS.tagline,
            about:    saved.about    ?? DEFAULTS.about,
            avatar:   saved.avatar   ?? DEFAULTS.avatar,
            cover:    saved.cover    ?? DEFAULTS.cover,
            skills:   saved.skills   ?? [...DEFAULTS.skills],
            projects: saved.projects ?? DEFAULTS.projects.map(p => ({...p}))
        };
    } catch(e) { return {...DEFAULTS, skills:[...DEFAULTS.skills], projects:DEFAULTS.projects.map(p=>({...p}))}; }
}

// ── SAVE ─────────────────────────────────────────────────
function persist() {
    const projects = [];
    document.querySelectorAll(".project-item").forEach(item => {
        projects.push({
            name: item.querySelector(".project-name").value,
            link: item.querySelector(".project-link").value
        });
    });
    const coverEl = document.getElementById("coverArea");
    localStorage.setItem("profileData", JSON.stringify({
        name:     document.getElementById("profileName").value,
        tagline:  document.getElementById("profileTagline").value,
        about:    document.getElementById("aboutText").value,
        avatar:   document.getElementById("avatarImg").src,
        cover:    coverEl.dataset.bg || null,
        skills:   skills,
        projects: projects
    }));
}

function saveProfile() {
    persist();
    const btn = document.getElementById("saveBtn");
    const bottomBtn = document.getElementById("bottomSaveBtn");
    btn.textContent = "Saved!";
    bottomBtn.textContent = "Saved! Refresh other tabs to see changes";
    bottomBtn.style.background = "#059669";
    setTimeout(() => {
        btn.textContent = "Save changes";
        btn.classList.remove("visible");
        bottomBtn.textContent = "Save changes";
        bottomBtn.style.background = "#6d28d9";
    }, 3000);
}

function showSave() {
    document.getElementById("saveBtn").classList.add("visible");
}

// ── SKILLS ───────────────────────────────────────────────
function renderSkills() {
    const wrap = document.getElementById("skillsWrap");
    wrap.innerHTML = "";
    skills.forEach((s, i) => {
        const tag = document.createElement("div");
        tag.className = "skill-tag";
        tag.innerHTML = s + ' <button class="skill-remove" onclick="removeSkill(' + i + ')">×</button>';
        wrap.appendChild(tag);
    });
}

function addSkill() {
    const input = document.getElementById("skillInput");
    const val = input.value.trim();
    if (!val) return;
    skills.push(val);
    input.value = "";
    renderSkills();
    showSave();
}

function removeSkill(i) {
    skills.splice(i, 1);
    renderSkills();
    showSave();
}

// ── PROJECTS ─────────────────────────────────────────────
function addProjectItem(name, link) {
    name = name || "";
    link = link || "";
    const list = document.getElementById("projectsList");
    const div = document.createElement("div");
    div.className = "project-item";
    div.innerHTML =
        '<button class="delete-btn" onclick="deleteProject(this)">×</button>' +
        '<input class="project-name" type="text" placeholder="Project name" oninput="showSave()">' +
        '<div class="project-link-wrap">' +
            '<span class="project-link-label">Link:</span>' +
            '<input class="project-link" type="text" placeholder="Project URL" oninput="showSave()">' +
        '</div>';
    list.appendChild(div);
    div.querySelector(".project-name").value = name;
    div.querySelector(".project-link").value = link;
    return div;
}

function addProject() {
    const div = addProjectItem();
    div.querySelector(".project-name").focus();
    showSave();
}

function deleteProject(btn) {
    btn.closest(".project-item").remove();
    showSave();
}

function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

// ── IMAGE UPLOADS ─────────────────────────────────────────
document.getElementById("avatarInput").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("avatarImg").src = e.target.result;
        showSave();
    };
    reader.readAsDataURL(file);
});

document.getElementById("coverInput").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const cover = document.getElementById("coverArea");
        cover.style.background = "url(" + e.target.result + ") center/cover no-repeat";
        cover.dataset.bg = e.target.result;
        showSave();
    };
    reader.readAsDataURL(file);
});

// ── SIDEBAR ───────────────────────────────────────────────
const hamburger = document.getElementById("hamburger");
const sidebar   = document.getElementById("sidebar");
const overlay   = document.getElementById("overlay");

hamburger.addEventListener("click", function() {
    const open = sidebar.classList.toggle("active");
    overlay.classList.toggle("active", open);
    hamburger.classList.toggle("active", open);
});

function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    hamburger.classList.remove("active");
}

// ── INIT ─────────────────────────────────────────────────
(function init() {
    const d = getData();
    document.getElementById("profileName").value    = d.name;
    document.getElementById("profileTagline").value = d.tagline;
    document.getElementById("aboutText").value      = d.about;
    document.getElementById("avatarImg").src        = d.avatar;

    if (d.cover) {
        const cover = document.getElementById("coverArea");
        cover.style.background = "url(" + d.cover + ") center/cover no-repeat";
        cover.dataset.bg = d.cover;
    }

    skills = d.skills.slice();
    renderSkills();

    d.projects.forEach(function(p) { addProjectItem(p.name, p.link); });

    autoResize(document.getElementById("aboutText"));
})();
</script>

</body>
</html>
