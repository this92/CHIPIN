<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #f4f5f8;
    min-height: 100vh;
    overflow-x: hidden;
}

/* HAMBURGER BUTTON */
.hamburger {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 2000;
    background: white;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    transition: background .2s;
}

.hamburger:hover {
    background: #f0ebff;
}

.hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: #6d28d9;
    border-radius: 2px;
    transition: .3s;
}

/* When sidebar open, animate to X */
.hamburger.active span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
}
.hamburger.active span:nth-child(2) {
    opacity: 0;
}
.hamburger.active span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 1500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 260px;
    background: white;
    z-index: 1600;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 30px rgba(0,0,0,.12);
}

.sidebar.active {
    transform: translateX(0);
}

.sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #f0ebff;
}

.sidebar-logo {
    font-size: 22px;
    font-weight: bold;
    color: #6d28d9;
    letter-spacing: -0.5px;
}

.sidebar-subtitle {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
}

.sidebar-links {
    list-style: none;
    padding: 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.sidebar-links li a {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #444;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    transition: .2s;
}

.sidebar-links li a:hover {
    background: #f0ebff;
    color: #6d28d9;
}

.sidebar-links li a .icon {
    font-size: 18px;
    width: 22px;
    text-align: center;
}

.sidebar-footer {
    padding: 20px 24px;
    border-top: 1px solid #f0ebff;
    font-size: 12px;
    color: #bbb;
}

/* HERO */
.hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 50%, #a855f7 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    padding: 60px 20px;
    position: relative;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: #fbbf24;
    opacity: .08;
    filter: blur(160px);
    border-radius: 50%;
    top: -100px;
    right: -100px;
    pointer-events: none;
}

.hero::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #c084fc;
    opacity: .15;
    filter: blur(120px);
    border-radius: 50%;
    bottom: -80px;
    left: -80px;
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 600px;
}

.hero-badge {
    display: inline-block;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    color: #fde68a;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 30px;
    margin-bottom: 24px;
    letter-spacing: .5px;
}

.hero h1 {
    font-size: 58px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 14px;
}

.hero h1 span {
    color: #fde68a;
}

.hero-content > p {
    font-size: 17px;
    color: rgba(255,255,255,.75);
    margin-bottom: 40px;
    line-height: 1.6;
}

/* SEARCH BOX */
.search-box {
    display: flex;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
}

.search-box input {
    border: none;
    outline: none;
    padding: 18px 22px;
    flex: 1;
    font-size: 15px;
    color: #111;
}

.search-box input::placeholder {
    color: #aaa;
}

.search-box button {
    border: none;
    background: #6d28d9;
    color: white;
    padding: 18px 28px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: background .2s;
    white-space: nowrap;
}

.search-box button:hover {
    background: #5b21b6;
}

/* RESULT */
#result {
    margin-top: 20px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: white;
    padding: 16px 22px;
    border-radius: 12px;
    display: none;
    text-align: center;
}

#result p {
    font-size: 14px;
    opacity: .85;
    margin-top: 4px;
}

#result h2 {
    font-size: 16px;
    font-weight: 600;
    color: #fde68a;
}

/* FOOTER */
footer {
    background: #0f0a1e;
    color: rgba(255,255,255,.45);
    text-align: center;
    padding: 28px;
    font-size: 13px;
}

@media (max-width: 600px) {
    .hero h1 { font-size: 38px; }
}
</style>
</head>

<body>

<!-- Hamburger -->
<button class="hamburger" id="hamburger" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">LOGO</div>
        <div class="sidebar-subtitle">Student Portal</div>
    </div>

    <ul class="sidebar-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="urprofile.html">Your Profile</a></li>
        <li><a href="message.html">Messages</a></li>
        <li><a href="job.html">Jobs</a></li>
        <li><a href="brainstorm.html">Brainstorm</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="sidebar-footer">© 2026 Your Website</div>
</aside>

<!-- Hero -->
<section class="hero">
    <div class="hero-content">
        <div class="hero-badge">Student Portal</div>

        <h1>Find any <span>student</span> instantly</h1>

        <p>Enter a student ID below to look up their profile, grades, and more.</p>

        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Enter student ID (e.g. 1111)">
            <button onclick="searchPerson()">Search →</button>
        </div>

        <div id="result"></div>
    </div>
</section>

<footer>
    © 2026 Your Website. All Rights Reserved.
</footer>

<script>
const people = [
    { id: "1111", name: "Reza", age: 20, location: "Pune",   college: "VU",              job: "Student"   },
    { id: "2222", name: "Ali",  age: 24, location: "Mumbai", college: "SPPU",             job: "Developer" },
    { id: "3333", name: "Sara", age: 22, location: "Delhi",  college: "Delhi University", job: "Designer"  }
];

function searchPerson() {
    const input = document.getElementById("searchInput").value.trim();
    const person = people.find(p => p.id === input);
    const result = document.getElementById("result");

    if (person) {
        localStorage.setItem("studentID", person.id);
        window.location.href = "loading.html";
    } else {
        result.style.display = "block";
        result.innerHTML = `
            <h2>No student found</h2>
            <p>No one matched that ID. Try 1111, 2222, or 3333.</p>
        `;
    }
}

document.getElementById("searchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") searchPerson();
});

// Sidebar toggle
const hamburger = document.getElementById("hamburger");
const sidebar   = document.getElementById("sidebar");
const overlay   = document.getElementById("overlay");

hamburger.addEventListener("click", function() {
    const open = sidebar.classList.toggle("active");
    overlay.classList.toggle("active", open);
    hamburger.classList.toggle("active", open);
});

function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    hamburger.classList.remove("active");
}
</script>

</body>
</html>
