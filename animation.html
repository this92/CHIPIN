<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Splash Screen</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

/* Splash Screen */
.splash{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Purple Gradient */
    background: linear-gradient(
        180deg,
        #14002e 0%,
        #2b0057 20%,
        #4b0082 45%,
        #6a0dad 70%,
        #8a2be2 100%
    );

    animation:fadeOut 1s ease forwards;
    animation-delay:3s;
}

/* Logo */
.logo{
    width:300px;
    opacity:0;
    transform:scale(0.2);
    animation:pop 0.9s cubic-bezier(.2,1.3,.3,1) forwards;
    filter:drop-shadow(0 0 30px rgba(255,255,255,.35));
}

@keyframes pop{
    0%{
        opacity:0;
        transform:scale(0.2);
    }
    70%{
        opacity:1;
        transform:scale(1.08);
    }
    100%{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

</style>
</head>

<body>

<div class="splash">

   
    <img src="logo2.png" class="logo" alt="Logo">

</div>

<script>

// Redirect after 3.5 seconds
setTimeout(() => {
    window.location.href = "home.html"; // Change to your homepage
}, 3500);

</script>

</body>
</html>
